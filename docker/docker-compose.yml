version: "3.8"

# Default profile runs CPU-only. Use `--profile gpu` to enable nvidia reservations:
#   docker compose --profile gpu up -d
# When the gpu profile is active, the *-gpu service overrides take effect.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ../data/models:/app/data/models:ro
      - upload_data:/app/tmp
    depends_on:
      - redis

  celery_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=1
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ../data/models:/app/data/models:ro
      - upload_data:/app/tmp
    depends_on:
      - redis

  backend-gpu:
    extends:
      service: backend
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery_worker-gpu:
    extends:
      service: celery_worker
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis_data:
  upload_data:
